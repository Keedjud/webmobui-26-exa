<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flouflix</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Icons" />
  <!-- <script type="module" src="./index.js" defer></script> -->
</head>

<body>
  <header class="topbar">
    <a class="brand" href="#home">🎬 Flouflix</a>
    <search-bar></search-bar>
  </header>

  <main>
    <!--- exemple de card pour les catégories --->
    <article class="card category-card ">
      <a class="card" href="">
        <div class="card-body">
          <span class="tag">Catégorie</span>
          <h3>nom</h3>
          <p>1 film(s)</p>
        </div>
      </a>
    </article>
    <!---------------------------------------->

    <!--- exemple de card pour les films --->
    <article class="card movie-item">
      <a href="">
        <img class="poster" src="" />
      </a>
      <div class="card-body stack">
        <div>
          <h3>titre</h3>
          <p>description</p>
        </div>
        <div class="section-header">
          <a class="primary-button" href="">Détails</a>

          <button class="favorite-button icon-button" aria-label="Favori">
            <span class="material-icons">thumb_up</span>
            <span class="material-icons">thumb_up_off_alt</span>
          </button>
        </div>
      </div>
    </article>
    <!---------------------------------------->
  </main>

  <movie-footer></movie-footer>
</body>

</html>
